<svg width="168" height="43" viewBox="0 0 360 100" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Gradients -->
  <defs>
    <linearGradient id="orbitGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </radialGradient>
  </defs>

  <!-- ICON (scaled tighter) -->
  <g transform="translate(5,15) scale(0.6)">
    <ellipse cx="40" cy="40" rx="30" ry="18"
      stroke="url(#orbitGrad)" stroke-width="3"
      transform="rotate(25 40 40)" opacity="0.9"/>

    <ellipse cx="40" cy="40" rx="30" ry="18"
      stroke="url(#orbitGrad)" stroke-width="3"
      transform="rotate(-25 40 40)" opacity="0.7"/>

    <circle cx="65" cy="30" r="4" fill="#06B6D4"/>
    <circle cx="20" cy="55" r="4" fill="#7C3AED"/>

    <circle cx="40" cy="40" r="11" fill="url(#coreGrad)"/>
  </g>

  <!-- TEXT (properly aligned) -->
  <text x="55" y="28"
    font-family="Poppins, Inter, sans-serif"
    font-size="20"
    font-weight="600"
    fill="#0F172A">
    Omni
  </text>

  <text x="110" y="28"
    font-family="Poppins, Inter, sans-serif"
    font-size="20"
    font-weight="600"
    fill="url(#orbitGrad)">
    .ai
  </text>

</svg>
