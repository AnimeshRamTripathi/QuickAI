<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Gradient -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g transform="translate(10,10)">
    <!-- Outer orbit -->
    <circle cx="30" cy="30" r="22" stroke="url(#grad)" stroke-width="2" opacity="0.5"/>
    
    <!-- Inner orbit -->
    <ellipse cx="30" cy="30" rx="22" ry="10" stroke="url(#grad)" stroke-width="2" opacity="0.7"/>
    
    <!-- Core -->
    <circle cx="30" cy="30" r="6" fill="url(#grad)"/>
  </g>

  <!-- Text -->
  <text x="80" y="50" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#111827" font-weight="600">
    Omni
  </text>
  <text x="155" y="50" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="url(#grad)" font-weight="600">
    .ai
  </text>
</svg>
